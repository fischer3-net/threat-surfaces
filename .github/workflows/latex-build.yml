# ==============================================================================
# latex-build.yml — Threat Surfaces | fischer³ Education
#
# PURPOSE:
#   Automatically compiles all exercises.tex files to PDF whenever a .tex file
#   or the shared preamble is modified. Compiled PDFs are committed back to the
#   same branch so students always have a current, downloadable PDF alongside
#   the source.
#
# TRIGGERS:
#   - Any push that modifies a .tex file under modules/ or refreshers/
#   - Any push that modifies assets/latex-preamble.tex (preamble changes
#     may affect all files, so everything is recompiled)
#   - Excluded: the solutions branch (handled by threat-surfaces-solutions repo)
#
# OUTPUT:
#   - exercises.pdf committed next to each exercises.tex (same directory)
#   - PDFs also uploaded as a workflow artifact for PR review
#
# COMMIT CONVENTION:
#   Bot commits use [skip ci] to prevent re-triggering this workflow.
# ==============================================================================

name: Compile LaTeX → PDF

on:
  push:
    branches-ignore:
      - solutions
    paths:
      - 'modules/**/exercises.tex'
      - 'refreshers/**/exercises.tex'
      - 'assets/latex-preamble.tex'

jobs:
  build:
    name: Compile exercises.tex → PDF
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so the bot commit has the correct parent
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 2. Cache apt packages
      #    Key includes a hash of the package list — cache invalidates if the
      #    list changes. Falls back to the most recent matching cache.
      # -----------------------------------------------------------------------
      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-texlive-${{ runner.os }}-v1
          restore-keys: |
            apt-texlive-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # 3. Install TeX Live
      #    Targeted package selection avoids the ~4 GB texlive-full install.
      #    Packages chosen to cover every dependency in assets/latex-preamble.tex:
      #      texlive-latex-base     — core: amsmath, amssymb, amsthm, article class
      #      texlive-latex-extra    — tcolorbox (+ skins/breakable/theorems),
      #                               enumitem, microtype, listings, geometry,
      #                               fancyhdr, booktabs, array, hyperref,
      #                               xcolor, mathtools, cancel
      #      texlive-fonts-recommended — lmodern
      #      texlive-science        — bm
      #      latexmk                — build orchestration (handles multi-pass)
      # -----------------------------------------------------------------------
      - name: Install TeX Live
        if: steps.apt-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            latexmk

      - name: Make installed packages available (cache hit path)
        if: steps.apt-cache.outputs.cache-hit == 'true'
        run: |
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            latexmk

      # -----------------------------------------------------------------------
      # 4. Compile all exercises.tex files
      #    - Runs from each file's own directory so that the relative path
      #      \input{../../assets/latex-preamble.tex} resolves correctly.
      #    - latexmk -pdf handles multi-pass compilation automatically
      #      (needed for hyperref page references and fancyhdr).
      #    - latexmk -c removes aux/log/fls/fdb_latexmk files, keeping only
      #      the PDF alongside the source.
      #    - Any compilation failure exits non-zero, failing the job and
      #      preventing a partial or stale PDF from being committed.
      # -----------------------------------------------------------------------
      - name: Compile all exercises.tex files
        run: |
          set -euo pipefail

          REPO_ROOT="$(pwd)"
          FAILED=0

          find modules refreshers -name 'exercises.tex' | sort | while read -r tex_file; do
            dir="$(dirname "$tex_file")"
            echo "──────────────────────────────────────────"
            echo "Compiling: $tex_file"
            echo "──────────────────────────────────────────"

            (
              cd "$dir"
              latexmk \
                -pdf \
                -interaction=nonstopmode \
                -file-line-error \
                -halt-on-error \
                exercises.tex

              # Remove auxiliary build files; keep only exercises.pdf
              latexmk -c exercises.tex
            ) || {
              echo "::error file=$tex_file::LaTeX compilation failed — check the log above for details."
              FAILED=1
            }
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "One or more exercises.tex files failed to compile."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 5. Upload PDFs as workflow artifact
      #    Useful for reviewing compiled output in pull requests without
      #    needing to clone and compile locally.
      # -----------------------------------------------------------------------
      - name: Upload compiled PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdfs
          path: |
            modules/**/exercises.pdf
            refreshers/**/exercises.pdf
          if-no-files-found: warn
          retention-days: 30

      # -----------------------------------------------------------------------
      # 6. Commit PDFs back to the branch
      #    - Only runs if there are actual changes to commit (avoids empty
      #      commits if PDFs are already current).
      #    - [skip ci] in the commit message prevents this workflow from
      #      triggering again on the bot's own commit.
      #    - Bot identity matches GitHub Actions convention.
      # -----------------------------------------------------------------------
      - name: Commit compiled PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all compiled PDFs
          git add modules/**/exercises.pdf refreshers/**/exercises.pdf 2>/dev/null || true

          # Only commit if something changed
          if git diff --cached --quiet; then
            echo "No PDF changes to commit — PDFs are already current."
          else
            git commit -m "infra(latex): auto-compile exercises.tex → PDF [skip ci]"
            git push
          fi